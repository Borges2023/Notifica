<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifica - Usuário</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>Notifica</h1>
        <p>Aproxime-se de uma empresa para receber aviso por voz e notificação.</p>
      </div>
      <nav class="top-menu">
        <a href="admin.html">Administrador</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="destination-form">
        <label for="destinationInput">Para onde você quer ir?</label>
        <div class="destination-controls">
          <input id="destinationInput" type="text" placeholder="Digite um endereço, ponto turístico ou destino..." />
          <button id="searchDestinationBtn" type="button">Buscar destino</button>
        </div>
        <ul id="destinationResults"></ul>
      </div>
      <button id="testNotificationBtn" type="button" class="secondary">Testar Notificação Próxima</button>
      <p id="status">Aguardando permissão de geolocalização...</p>
      <p id="distanceInfo"></p>
      <p id="routeInfo"></p>
    </section>

    <section class="card">
      <h3>Mapa do usuário</h3>
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
